<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Менеджмент</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>CRM System</h2>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="manage.html" class="active">Менеджмент-панель</a></li>
            <li><a href="admin.html">Адмін-панель</a></li>
            <li><a href="report.html">Знайшли помилку?</a></li>
            <li><a href="bug_manager.html">Менеджер репортів</a></li>
        </ul>
    </nav>

    <main class="content" style="padding: 20px; max-height: 100vh; overflow: hidden;">
        <header class="top-bar" style="margin-bottom: 15px;">
            <h1 style="font-size: 1.5rem;">Аналітика та Менеджмент</h1>
            <div id="auth-status"></div>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; align-items: start;">
            
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0; min-height: auto;">
                    <div class="stat-card" style="width: auto; padding: 15px; margin: 0; background: linear-gradient(135deg, #6366f1, #4338ca);">
                        <h3 style="font-size: 0.8rem;">Всього</h3>
                        <p id="total-clients" style="font-size: 1.8rem;">0</p>
                    </div>
                    <div class="stat-card" style="width: auto; padding: 15px; margin: 0; background: linear-gradient(135deg, #22c55e, #15803d);">
                        <h3 style="font-size: 0.8rem;">VIP</h3>
                        <p id="vip-clients" style="font-size: 1.8rem;">0</p>
                    </div>
                    <div class="stat-card" style="width: auto; padding: 15px; margin: 0; background: linear-gradient(135deg, #f59e0b, #d97706);">
                        <h3 style="font-size: 0.8rem;">Ліди</h3>
                        <p id="new-leads" style="font-size: 1.8rem;">0</p>
                    </div>
                </div>

                <section class="auth-section" style="margin: 0; padding: 15px; text-align: left;">
                    <h3 style="margin-bottom: 10px; font-size: 1rem;">Розподіл статусів</h3>
                    <div id="status-distribution" style="font-size: 0.9rem;">Завантаження...</div>
                </section>
            </div>

            <div class="card-item" style="margin: 0; padding: 0; height: calc(100vh - 120px); display: flex; flex-direction: column;">
                <div style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; font-size: 1rem;">Керування клієнтами</h3>
                    <input type="text" id="client-search" class="form-input" placeholder="Пошук..." style="width: 150px; padding: 5px 10px; font-size: 0.85rem;">
                </div>

                <div style="flex: 1; overflow-y: auto; border-bottom: 1px solid #eee;">
                    <table class="admin-table" style="font-size: 0.85rem;">
                        <thead style="position: sticky; top: 0; background: white; z-index: 1;">
                            <tr>
                                <th>Клієнт</th>
                                <th>Статус</th>
                                <th style="text-align: right;">Дія</th>
                            </tr>
                        </thead>
                        <tbody id="client-table-body">
                            <tr><td colspan="3" style="text-align:center;">Завантаження...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div id="edit-zone" style="padding: 15px; background: #f8fafc; display: none;">
                    </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
