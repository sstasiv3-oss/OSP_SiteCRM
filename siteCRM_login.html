<link rel="stylesheet" href="siteCRM_style.css">
<main class="content">
    
    <div class="login-container">
        
        <section class="auth-section">
            <h3>Вхід у систему</h3>
            
            <div class="input-group">
                <input type="text" id="loginInput" class="form-input" placeholder="Логін">
            </div>
            
            <div class="input-group">
                <input type="password" id="passInput" class="form-input" placeholder="Пароль">
            </div>
            
            <button onclick="login(document.getElementById('loginInput').value, document.getElementById('passInput').value)" class="btn-submit">Увійти</button>
        </section>

    </div>
</main>

<script src="siteCRM_script.js"></script>
