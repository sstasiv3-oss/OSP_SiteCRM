<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CRM - Головна</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>CRM System</h2>
        <ul>
            <li><a href="index.html" class="active">Головна</a></li>
            <li><a href="manege.html">Менеджмент-панель</a></li>
            <li><a href="admin.html">Адмін-панель</a></li>
            <li><a href="report.html">Знайшли помилку?</a></li>
            <li><a href="bug_manager.html">Менеджер репортів</a></li>
        </ul>
    </nav>

    <main class="content">
        <header class="top-bar">
            <h1>Дашборд</h1>
            <div id="auth-status"></div>
        </header>

        <section class="stats">
            <div class="stat-card" style="background: #5c59f2; color: white;">
                <h3>Клієнти</h3>
                <p id="client-count">0</p>
            </div>
        </section>

        <section class="search-section" style="display: flex; gap: 15px; margin-bottom: 25px;">
            <input type="text" id="searchInput" placeholder="Пошук (ім'я, email або компанія)..." style="flex: 1;">
            
            <select id="statusFilter" class="form-input" style="width: auto; min-width: 150px;">
                <option value="all">Всі статуси</option>
                <option value="Новий">Новий</option>
                <option value="Постійний">Постійний</option>
                <option value="VIP">VIP</option>
                <option value="В роботі">В роботі</option>
            </select>
        </section>

        <div id="clientsGrid" class="grid">
            </div>

        <div class="pagination-wrapper" style="margin-top: 30px; display: flex; justify-content: center; flex-direction: column; align-items: center;">
            <ul id="pagination" class="pagination-list" style="display: flex; list-style: none; gap: 10px; padding: 0;">
            </ul>
            <button id="showMoreBtn" class="btn-top-auth" style="margin-top: 15px; display: none;">Показати більше</button>
        </div>
    </main>

    <script type = "module" src="script.js"></script>
</body>
</html>
